name: Backend Deploy

on:
  workflow_dispatch:
  push:
    branches:
      - master
    tags:
      - "v*"

env:
  PIP_CACHE_DIR: /cache/pip
  BACKEND_DIR: tempo-backend
  SERVICE_NAME: tempo-backend

jobs:
  test:
    name: Test backend
    runs-on: ubuntu-latest
    container: python:3.14
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: tempo_backend
          POSTGRES_USER: tempo
          POSTGRES_PASSWORD: tempo
        options: >-
          --health-cmd "pg_isready -U tempo -d tempo_backend"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      TEMPO_BACKEND_POSTGRES_DSN: postgresql://tempo:tempo@postgres:5432/tempo_backend
      TEMPO_BACKEND_REDIS_ENDPOINT: redis://redis:6379/0
      PROXYP2P_API_URL: http://localhost:8080
      PROXYP2P_ORG_ID: "1"
      PROXYP2P_API_KEY: ""
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache uv and pip
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/uv
            /cache/pip
          key: backend-python-${{ runner.os }}-${{ hashFiles('tempo-backend/uv.lock') }}
          restore-keys: backend-python-${{ runner.os }}-

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Install dependencies
        working-directory: ${{ env.BACKEND_DIR }}
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          uv sync --locked --dev

      - name: Run tests
        working-directory: ${{ env.BACKEND_DIR }}
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          uv run pytest

      - name: Run ruff
        working-directory: ${{ env.BACKEND_DIR }}
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          uv run ruff check .

  deploy:
    name: Deploy backend
    runs-on: ubuntu-latest
    container: python:3.14
    needs: test
    if: github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/')
    environment:
      name: ${{ startsWith(github.ref, 'refs/tags/') && 'production' || 'development' }}
    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_HOME: ${{ secrets.DEPLOY_HOME }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
      TEMPO_BACKEND_POSTGRES_DSN: ${{ secrets.TEMPO_BACKEND_POSTGRES_DSN }}
      TEMPO_BACKEND_REDIS_ENDPOINT: ${{ secrets.TEMPO_BACKEND_REDIS_ENDPOINT }}
      TEMPO_BACKEND_REDIS_HOST: ${{ secrets.TEMPO_BACKEND_REDIS_HOST }}
      TEMPO_BACKEND_REDIS_PORT: ${{ secrets.TEMPO_BACKEND_REDIS_PORT }}
      TEMPO_BACKEND_REDIS_DB: ${{ secrets.TEMPO_BACKEND_REDIS_DB }}
      TEMPO_BACKEND_PROXYP2P_API_KEY: ${{ secrets.TEMPO_BACKEND_PROXYP2P_API_KEY }}
      TEMPO_BACKEND_PROXYP2P_API_URL: ${{ vars.TEMPO_BACKEND_PROXYP2P_API_URL }}
      TEMPO_BACKEND_PROXYP2P_ORG_ID: ${{ vars.TEMPO_BACKEND_PROXYP2P_ORG_ID }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install SSH client
        run: |
          apt-get update -y
          apt-get install -y openssh-client rsync

      - name: Configure SSH
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" | tr -d '\r' > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Package backend
        run: tar -czf backend.tar.gz "$BACKEND_DIR"

      - name: Upload backend
        run: |
          ssh "$DEPLOY_USER@$DEPLOY_HOST" "mkdir -p '$DEPLOY_HOME/releases' '$DEPLOY_HOME/shared'"
          scp backend.tar.gz "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_HOME/releases/backend-${GITHUB_SHA}.tar.gz"

      - name: Deploy systemd service
        run: |
          ssh "$DEPLOY_USER@$DEPLOY_HOST" \
            DEPLOY_HOME="$DEPLOY_HOME" \
            RELEASE_SHA="$GITHUB_SHA" \
            SERVICE_NAME="$SERVICE_NAME" \
            TEMPO_BACKEND_POSTGRES_DSN="$TEMPO_BACKEND_POSTGRES_DSN" \
            TEMPO_BACKEND_REDIS_ENDPOINT="$TEMPO_BACKEND_REDIS_ENDPOINT" \
            TEMPO_BACKEND_REDIS_HOST="$TEMPO_BACKEND_REDIS_HOST" \
            TEMPO_BACKEND_REDIS_PORT="$TEMPO_BACKEND_REDIS_PORT" \
            TEMPO_BACKEND_REDIS_DB="$TEMPO_BACKEND_REDIS_DB" \
            TEMPO_BACKEND_PROXYP2P_API_KEY="$TEMPO_BACKEND_PROXYP2P_API_KEY" \
            TEMPO_BACKEND_PROXYP2P_API_URL="$TEMPO_BACKEND_PROXYP2P_API_URL" \
            TEMPO_BACKEND_PROXYP2P_ORG_ID="$TEMPO_BACKEND_PROXYP2P_ORG_ID" \
            'bash -s' <<'REMOTE'
          set -eu

          release_dir="$DEPLOY_HOME/releases/$RELEASE_SHA"
          app_dir="$release_dir/tempo-backend"
          mkdir -p "$release_dir" "$DEPLOY_HOME/shared" ~/.config/systemd/user
          tar -xzf "$DEPLOY_HOME/releases/backend-$RELEASE_SHA.tar.gz" -C "$release_dir"

          if ! command -v uv >/dev/null 2>&1; then
            curl -LsSf https://astral.sh/uv/install.sh | sh
          fi
          export PATH="$HOME/.local/bin:$PATH"

          cd "$app_dir"
          uv venv "$DEPLOY_HOME/venv"
          . "$DEPLOY_HOME/venv/bin/activate"
          uv pip install --upgrade pip
          uv pip install .

          if [ -z "${TEMPO_BACKEND_REDIS_ENDPOINT:-}" ] && [ -n "${TEMPO_BACKEND_REDIS_HOST:-}" ]; then
            redis_port="${TEMPO_BACKEND_REDIS_PORT:-6379}"
            redis_db="${TEMPO_BACKEND_REDIS_DB:-0}"
            TEMPO_BACKEND_REDIS_ENDPOINT="redis://$TEMPO_BACKEND_REDIS_HOST:$redis_port/$redis_db"
          fi

          cat > "$DEPLOY_HOME/shared/backend.env" <<ENV
          TEMPO_BACKEND_POSTGRES_DSN=$TEMPO_BACKEND_POSTGRES_DSN
          TEMPO_BACKEND_REDIS_ENDPOINT=$TEMPO_BACKEND_REDIS_ENDPOINT
          TEMPO_BACKEND_PROXYP2P_API_KEY=$TEMPO_BACKEND_PROXYP2P_API_KEY
          TEMPO_BACKEND_PROXYP2P_API_URL=$TEMPO_BACKEND_PROXYP2P_API_URL
          TEMPO_BACKEND_PROXYP2P_ORG_ID=$TEMPO_BACKEND_PROXYP2P_ORG_ID
          ENV

          cat > ~/.config/systemd/user/$SERVICE_NAME.service <<SERVICE
          [Unit]
          Description=Tempo Backend
          After=network-online.target

          [Service]
          Type=simple
          WorkingDirectory=$app_dir
          EnvironmentFile=$DEPLOY_HOME/shared/backend.env
          ExecStart=$DEPLOY_HOME/venv/bin/tempo-backend
          Restart=always
          RestartSec=5

          [Install]
          WantedBy=default.target
          SERVICE

          ln -sfn "$release_dir" "$DEPLOY_HOME/current"
          systemctl --user daemon-reload
          systemctl --user enable "$SERVICE_NAME.service"
          systemctl --user restart "$SERVICE_NAME.service"
          REMOTE
